          Write-Host "Wrote release body to $outFile (length: $((Get-Content $outFile -Raw).Length) chars)"

      - name: Create release using GitHub API (avoids expression length limits)
        id: create_release_api
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          $tag = $env:TAG
          $repo = $env:REPO
          $token = $env:GITHUB_TOKEN

          $body = Get-Content -Raw -Path release_body.md

          # Build payload. You can set "name" separately if you'd like.
          $payload = @{
            tag_name   = $tag
            name       = $tag
            body       = $body
            draft      = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10

          $url = "https://api.github.com/repos/$repo/releases"
          $headers = @{
            Authorization = "token $token"
            "User-Agent"  = "github-actions"
            Accept        = "application/vnd.github+json"
          }

          Write-Host "Creating release $tag for $repo..."
          $resp = Invoke-RestMethod -Uri $url -Method Post -Headers $headers -Body $payload -ContentType "application/json"
          Write-Host "Release created: $($resp.html_url)"

      - name: Upload release
        id: upload_release
        uses: actions/github-script@v3
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            for (let file of await fs.readdirSync('./release')) {
              if (path.extname(file) === '.zip') {
                console.log('uploadReleaseAsset', file);
                await github.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./release/${file}`)
                });
              }
            }
