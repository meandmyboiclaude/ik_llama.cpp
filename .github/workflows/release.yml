      - name: Upload release
        id: upload_release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');

            const release_id = '${{ steps.create_release.outputs.id }}';
            const dir = './release';
            const maxAttempts = 4;
            const backoffBaseMs = 500;

            if (!fs.existsSync(dir)) {
              console.log(`Directory ${dir} does not exist - nothing to upload.`);
              return;
            }

            const files = fs.readdirSync(dir).filter(f => path.extname(f).toLowerCase() === '.zip');
            if (files.length === 0) {
              console.log('No .zip files found to upload.');
              return;
            }

            function normalizeRemoteDigest(raw) {
              if (!raw) return null;
              return raw.replace(/^sha256:/i, '').toLowerCase();
            }

            function computeLocalSha256(filePath) {
              return new Promise((resolve, reject) => {
                const h = crypto.createHash('sha256');
                const s = fs.createReadStream(filePath);
                s.on('error', reject);
                s.on('data', chunk => h.update(chunk));
                s.on('end', () => resolve(h.digest('hex')));
              });
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // helper: find existing asset by name (returns null if not found)
            async function findExistingAssetByName(name) {
              const resp = await github.rest.repos.listReleaseAssets({
                owner,
                repo,
                release_id,
                per_page: 100
              });
              const assets = resp.data || [];
              return assets.find(a => a.name === name) || null;
            }

            for (const file of files) {
              const filePath = path.join(dir, file);
              const stat = fs.statSync(filePath);
              const expectedSize = stat.size;

              console.log(`\n=== Processing ${file} (${expectedSize} bytes) ===`);

              // compute local sha (needed to validate remote digest if present)
              const localSha = await computeLocalSha256(filePath);
              console.log(`Local SHA256: ${localSha}`);

              // check if asset already exists on the release
              const existing = await findExistingAssetByName(file);
              if (existing) {
                const existingId = existing.id;
                const remoteDigestRaw = existing.digest ?? null;
                const remoteDigest = normalizeRemoteDigest(remoteDigestRaw);
                const remoteSize = Number(existing.size);

                console.log(`Found existing asset id=${existingId} size=${remoteSize} digest=${remoteDigestRaw ?? '<none>'}`);

                if (remoteDigest) {
                  if (remoteDigest === localSha.toLowerCase()) {
                    console.log(`✅ Remote digest matches local for ${file} — skipping upload.`);
                    continue; // already correct, skip to next file
                  } else {
                    console.warn(`❌ Remote digest present but does not match local (will delete and re-upload).`);
                    // delete the bad asset so we can upload fresh below
                    try {
                      await github.rest.repos.deleteReleaseAsset({
                        owner,
                        repo,
                        asset_id: existingId
                      });
                      console.log(`Deleted existing asset id=${existingId}`);
                    } catch (delErr) {
                      console.warn(`Failed to delete existing asset id=${existingId}: ${delErr && delErr.message ? delErr.message : delErr}`);
                      // fall through to attempt upload anyway; if delete failed, upload may conflict
                    }
                  }
                } else {
                  // no digest present on remote — fall back to size check
                  if (remoteSize === expectedSize) {
                    console.log(`⚠️ Remote has no digest but sizes match for ${file} — skipping upload (fallback).`);
                    continue;
                  } else {
                    console.warn(`❌ Remote has no digest and size mismatch (will delete and re-upload).`);
                    try {
                      await github.rest.repos.deleteReleaseAsset({
                        owner,
                        repo,
                        asset_id: existingId
                      });
                      console.log(`Deleted existing asset id=${existingId}`);
                    } catch (delErr) {
                      console.warn(`Failed to delete existing asset id=${existingId}: ${delErr && delErr.message ? delErr.message : delErr}`);
                    }
                  }
                }
              } // end existing asset handling

              // Upload loop (with retries) — only executed if we need to upload
              let attempt = 0;
              let success = false;
              while (attempt < maxAttempts && !success) {
                attempt++;
                console.log(`Upload attempt ${attempt} for ${file}...`);
                const stream = fs.createReadStream(filePath);
                try {
                  const resp = await github.rest.repos.uploadReleaseAsset({
                    owner,
                    repo,
                    release_id,
                    name: file,
                    data: stream,
                    headers: {
                      'content-type': 'application/zip',
                      'content-length': expectedSize
                    }
                  });

                  const uploadedSize = Number(resp.data.size);
                  const assetId = resp.data.id;
                  const remoteDigestRaw = resp.data.digest ?? null;
                  const remoteDigest = normalizeRemoteDigest(remoteDigestRaw);

                  console.log(`Uploaded asset id=${assetId} size=${uploadedSize} digest=${remoteDigestRaw ?? '<none>'}`);

                  // validate
                  if (remoteDigest) {
                    if (remoteDigest === localSha.toLowerCase()) {
                      console.log(`✅ Digest match after upload for ${file}`);
                      success = true;
                    } else {
                      console.warn(`❌ Digest mismatch after upload for ${file}: local=${localSha} remote=${remoteDigestRaw}`);
                    }
                  } else {
                    if (uploadedSize === expectedSize) {
                      console.log(`⚠️ Digest unavailable, but size matches after upload for ${file} — accepting (fallback).`);
                      success = true;
                    } else {
                      console.warn(`❌ Size mismatch after upload for ${file}: expected=${expectedSize} uploaded=${uploadedSize}`);
                    }
                  }

                  // if verification failed, delete the uploaded asset so retries don't accumulate bad assets
                  if (!success) {
                    try {
                      console.log(`Deleting asset id=${assetId} (verification failed) ...`);
                      await github.rest.repos.deleteReleaseAsset({
                        owner,
                        repo,
                        asset_id: assetId
                      });
                      console.log(`Deleted asset id=${assetId}`);
                    } catch (delErr) {
                      console.warn(`Failed deleting bad uploaded asset id=${assetId}: ${delErr && delErr.message ? delErr.message : delErr}`);
                    }

                    if (attempt < maxAttempts) {
                      const wait = Math.pow(2, attempt) * backoffBaseMs;
                      console.log(`Will retry in ${wait}ms...`);
                      await new Promise(r => setTimeout(r, wait));
                    } else {
                      throw new Error(`Failed verification after ${maxAttempts} attempts for ${file}`);
                    }
                  }

                } catch (err) {
                  console.warn(`Attempt ${attempt} error for ${file}: ${err && err.message ? err.message : String(err)}`);
                  if (attempt < maxAttempts) {
                    const wait = Math.pow(2, attempt) * backoffBaseMs;
                    console.log(`Retrying in ${wait}ms...`);
                    await new Promise(r => setTimeout(r, wait));
                  } else {
                    throw new Error(`Upload failed after ${maxAttempts} attempts for ${file}: ${err && err.message ? err.message : String(err)}`);
                  }
                } finally {
                  try { stream.destroy(); } catch (e) { /* ignore */ }
                }
              } // end upload attempts

              if (!success) {
                throw new Error(`Giving up on ${file} after ${maxAttempts} attempts.`);
              }
            } // end files loop

            console.log('All uploads processed.');