name: Release

on:
  workflow_dispatch: # allows manual triggering
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - master
    paths: ['.github/workflows/release.yml', '**/CMakeLists.txt', '**/.cmake', '**/*.h', '**/*.hpp', '**/*.c', '**/*.cpp', '**/*.cu', '**/*.cuh', '**/*.swift', '**/*.m', '**/*.metal', '**/*.comp']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=OFF -DBUILD_SHARED_LIBS=OFF"

jobs:
  macOS-arm64:
    #if: false
    runs-on: macos-14

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: macOS-latest-cmake-arm64
          evict-old-files: 1d

      - name: Dependencies
        id: depends
        continue-on-error: true
        run: |
          brew update
          brew install curl

      - name: Build
        id: cmake_build
        run: |
          sysctl -a
          cmake -B build \
            -DCMAKE_BUILD_RPATH="@loader_path" \
            -DLLAMA_FATAL_WARNINGS=OFF \
            -DGGML_METAL_USE_BF16=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DGGML_RPC=OFF \
            -DGGML_MAX_CONTEXTS=2048 \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize -j $(sysctl -n hw.logicalcpu)

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/
          zip -r llama-${{ steps.tag.outputs.name }}-bin-macos-arm64.zip ./build/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-macos-arm64.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-macos-arm64.zip

  macOS-x64:
    #if: false
    runs-on: macos-15-intel
    
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: macOS-latest-cmake-x64
          evict-old-files: 1d

      - name: Dependencies
        id: depends
        continue-on-error: true
        run: |
          brew update
          brew install curl

      - name: Build
        id: cmake_build
        run: |
          sysctl -a
          # Metal is disabled due to intermittent failures with Github runners not having a GPU:
          # https://github.com/ggml-org/llama.cpp/actions/runs/8635935781/job/23674807267#step:5:2313
          cmake -B build \
            -DCMAKE_BUILD_RPATH="@loader_path" \
            -DLLAMA_FATAL_WARNINGS=OFF \
            -DGGML_METAL_USE_BF16=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DGGML_RPC=OFF \
            -DGGML_MAX_CONTEXTS=2048 \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize -j $(sysctl -n hw.logicalcpu)

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/
          zip -r llama-${{ steps.tag.outputs.name }}-bin-macos-x64.zip ./build/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-macos-x64.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-macos-x64.zip

  ubuntu-22-cpu:
    #if: false
    strategy:
      matrix:
        include:
          - build: 'x64'
            os: ubuntu-22.04
          #- build: 'arm64'
          #  os: ubuntu-22.04-arm
        
    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: ubuntu-cpu-cmake
          evict-old-files: 1d

      - name: Dependencies
        id: depends
        run: |
          sudo apt-get update
          sudo apt-get install build-essential libcurl4-openssl-dev

      - name: Build
        id: cmake_build
        run: |
          cmake -B build \
            -DLLAMA_FATAL_WARNINGS=OFF \
            -DGGML_MAX_CONTEXTS=2048 \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize -j $(nproc)

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name
        
      - name: Check workspace contents
        run: |
          echo "=== Working directory ==="
          pwd
      
          echo
          echo "=== Top-level files ==="
          ls -la
      
          echo
          echo "=== Recursive listing of entire repo ==="
          ls -R .
      
          echo
          echo "=== Locate LICENSE file(s) ==="
          find . -type f -iname "LICENSE" -print || echo "No LICENSE file found"
      
          echo
          echo "=== Contents of build/ ==="
          if [[ -d build ]]; then
            ls -R build
          else
            echo "No build/ directory exists"
          fi
      
          echo
          echo "=== Executable binaries under build/ ==="
          if [[ -d build ]]; then
            find build -type f -executable -print || echo "No executables found in build/"
          else
            echo "Skipping find (build/ not present)"
          fi

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/
          zip -r llama-${{ steps.tag.outputs.name }}-bin-ubuntu-${{ matrix.build }}.zip ./build/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-ubuntu-${{ matrix.build }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-ubuntu-${{ matrix.build }}.zip

  ubuntu-22-vulkan:
    if: false
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: ubuntu-22-cmake-vulkan
          evict-old-files: 1d

      - name: Dependencies
        id: depends
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y build-essential mesa-vulkan-drivers vulkan-sdk libcurl4-openssl-dev

      - name: Build
        id: cmake_build
        run: |
          cmake -B build \
            -DGGML_VULKAN=ON \
            -DGGML_MAX_CONTEXTS=2048 \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize -j $(nproc)

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/
          zip -r llama-${{ steps.tag.outputs.name }}-bin-ubuntu-vulkan-x64.zip ./build/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-ubuntu-vulkan-x64.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-ubuntu-vulkan-x64.zip

  windows-cpu:
    #if: false # Not ready yet
    runs-on: windows-2022

    strategy:
      matrix:
        arch: ['x64'] #, 'arm64'

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cmake-cpu-${{ matrix.arch }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: |
          choco install ninja

      - name: Detect Visual Studio installation and available clang
        shell: pwsh
        run: |
          # detect Enterprise, then BuildTools; set VS_DIR and LLVM_DIR (written to GITHUB_ENV)
          if (Test-Path 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise') {
            $vs = 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          elseif (Test-Path 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools') {
            $vs = 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          else {
            Write-Error "No supported Visual Studio installation found under expected paths."
            exit 1
          }

          Write-Host "Detected VS root: $vs"
          Write-Host "Assuming LLVM dir: $llvm"

          Add-Content -Path $env:GITHUB_ENV -Value ("VS_DIR=" + $vs)
          Add-Content -Path $env:GITHUB_ENV -Value ("LLVM_DIR=" + $llvm)

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch == 'x64' && 'x64' || 'amd64_arm64' }}
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DLLAMA_FATAL_WARNINGS=OFF ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU_ALL_VARIANTS=${{ matrix.arch == 'x64' && 'ON' || 'OFF' }} ^
            -DGGML_OPENMP=ON ^
            -DCURL_LIBRARY="%CURL_PATH%\lib\libcurl.dll.a" ^
            -DCURL_INCLUDE_DIR="%CURL_PATH%\include" ^
            -DGGML_MAX_CONTEXTS=2048 ^
            -DLLAMA_CURL=OFF ^
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        shell: pwsh
        run: |
          # quick note: "VC143" is the Visual C++ toolset folder name (msvc v14.3x, VS 2022).
          $redistRoot = Join-Path $env:VS_DIR "VC\Redist\MSVC"
          if (-not (Test-Path $redistRoot)) {
            Write-Error "MSVC redist root not found at $redistRoot (VS_DIR = $env:VS_DIR)"
            exit 1
          }
          # Prefer newest redist version folder name (sort descending)
          $msvcDirs = Get-ChildItem -Path $redistRoot -Directory -ErrorAction SilentlyContinue |
                      Sort-Object Name -Descending
          if (-not $msvcDirs) {
            Write-Error "No versioned directories found under $redistRoot"
            exit 1
          }
          $arch        = "${{ matrix.arch }}"                                   # e.g. x64 or arm64
          $llvmArch    = "${{ matrix.arch == 'x64' && 'x86_64' || 'aarch64' }}"  # keep your existing mapping
          $foundDll    = $null
          $foundDir    = $null
          foreach ($d in $msvcDirs) {
            # common redist layout uses debug_nonredist\<arch>\... ; search recursively for libomp140.*dll
            $searchRoot = Join-Path $d.FullName ("debug_nonredist\$arch")
            if (-not (Test-Path $searchRoot)) { continue }
            # look for libomp140.<arch>.dll (most robust) or any libomp140*.dll
            $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140.$llvmArch.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $dll) {
              # fallback: maybe filename differs slightly -> search libomp140*.dll
              $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140*.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($dll) {
              $foundDll = $dll.FullName
              $foundDir = $d.FullName
              break
            }
          }
          if (-not $foundDll) {
            Write-Error "Could not locate libomp DLL under $redistRoot for arch '$arch' (searched directories: $($msvcDirs | ForEach-Object { $_.Name } -join ', '))."
            exit 1
          }
          Write-Host "Found libomp DLL: $foundDll (in $foundDir)"
          Copy-Item -Path $foundDll -Destination ".\build\bin\Release\" -Force
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.arch }}.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.arch }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.arch }}.zip

  windows-cpu-clang:
    #if: false # Not ready yet
    runs-on: windows-2022

    strategy:
      matrix:
        # include allows us to carry both march and optional mtune per entry
        include:
          - arch: x64
            march: x86-64-v3
            mtune: ""
            label: x86_64_v3
          - arch: x64
            march: x86-64-v4
            mtune: ""
            label: x86_64_v4
          - arch: x64
            march: znver1
            mtune: znver1
            label: znver1
          - arch: x64
            march: znver2
            mtune: znver2
            label: znver2
          - arch: x64
            march: znver3
            mtune: znver3
            label: znver3
          - arch: x64
            march: znver4
            mtune: znver4
            label: znver4
          - arch: x64
            march: znver5
            mtune: znver5
            label: znver5
          # https://www.intel.com/content/www/us/en/docs/dpcpp-cpp-compiler/developer-guide-reference/2025-2/march.html
          - arch: x64
            march: haswell
            mtune: haswell
            label: haswell
          - arch: x64
            march: core-avx2
            mtune: core-avx2
            label: core-avx2
          - arch: x64
            march: broadwell
            mtune: broadwell
            label: broadwell
          - arch: x64
            march: skylake
            mtune: skylake
            label: skylake
          - arch: x64
            march: skylake-avx512
            mtune: skylake-avx512
            label: skylake-avx512
          - arch: x64
            march: skx
            mtune: skx
            label: skx
          - arch: x64
            march: cascadelake
            mtune: cascadelake
            label: cascadelake
          - arch: x64
            march: cooperlake
            mtune: cooperlake
            label: cooperlake
          - arch: x64
            march: cannonlake
            mtune: cannonlake
            label: cannonlake
          - arch: x64
            march: icelake-client
            mtune: icelake-client
            label: icelake-client
          - arch: x64
            march: rocketlake
            mtune: rocketlake
            label: rocketlake
          - arch: x64
            march: icelake-server
            mtune: icelake-server
            label: icelake-server
          - arch: x64
            march: tigerlake
            mtune: tigerlake
            label: tigerlake
          - arch: x64
            march: sapphirerapids
            mtune: sapphirerapids
            label: sapphirerapids
          - arch: x64
            march: alderlake
            mtune: alderlake
            label: alderlake
          - arch: x64
            march: raptorlake
            mtune: raptorlake
            label: raptorlake
          - arch: x64
            march: meteorlake
            mtune: meteorlake
            label: meteorlake
          - arch: x64
            march: sierraforest
            mtune: sierraforest
            label: sierraforest
          - arch: x64
            march: grandridge
            mtune: grandridge
            label: grandridge
          - arch: x64
            march: graniterapids
            mtune: graniterapids
            label: graniterapids
          - arch: x64
            march: emeraldrapids
            mtune: emeraldrapids
            label: emeraldrapids

    env:
      MARCH: ${{ matrix.march }}
      MTUNE: ${{ matrix.mtune }}
      BUILD_LABEL: ${{ matrix.label }}

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cmake-cpu-${{ env.BUILD_LABEL }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: |
          choco install ninja

      - name: Detect Visual Studio installation and available clang
        shell: pwsh
        run: |
          # detect Enterprise, then BuildTools; set VS_DIR and LLVM_DIR (written to GITHUB_ENV)
          if (Test-Path 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise') {
            $vs = 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          elseif (Test-Path 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools') {
            $vs = 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          else {
            Write-Error "No supported Visual Studio installation found under expected paths."
            exit 1
          }

          Write-Host "Detected VS root: $vs"
          Write-Host "Assuming LLVM dir: $llvm"

          Add-Content -Path $env:GITHUB_ENV -Value ("VS_DIR=" + $vs)
          Add-Content -Path $env:GITHUB_ENV -Value ("LLVM_DIR=" + $llvm)

          # now detect which clang binary exists
          $clangCl = Join-Path $llvm 'bin\clang-cl.exe'
          $clang   = Join-Path $llvm 'bin\clang.exe'

          if (Test-Path $clangCl) {
            Write-Host "Found clang-cl at $clangCl"
            Add-Content -Path $env:GITHUB_ENV -Value 'CMAKE_COMPILER_TYPE=clang-cl'
          }
          elseif (Test-Path $clang) {
            Write-Host "Found clang at $clang"
            Add-Content -Path $env:GITHUB_ENV -Value 'CMAKE_COMPILER_TYPE=clang'
          }
          else {
            Write-Error "No clang binary found in $llvm. Please install the LLVM/clang components in Visual Studio (Individual components -> filter 'clang')."
            exit 1
          }

      - name: Build
        shell: cmd
        env:
          MARCH: ${{ env.MARCH }}
          MTUNE: ${{ env.MTUNE }}
        run: |
          rem set up the MSVC environment
          call "%VS_DIR%\VC\Auxiliary\Build\vcvarsall.bat" x64

          rem prepare optional mtune flags (only set if MTUNE is non-empty)
          set "MTUNE_FLAG="
          if not "%MTUNE%"=="" set "MTUNE_FLAG=/clang:-mtune=%MTUNE%"

          rem choose compiler binary and flags based on detection
          if "%CMAKE_COMPILER_TYPE%"=="clang-cl" (
            set "CC=%LLVM_DIR%\bin\clang-cl.exe"
            set "CXX=%LLVM_DIR%\bin\clang-cl.exe"
            set "CFLAGS=/clang:-march=%MARCH% %MTUNE_FLAG% /clang:-fvectorize /clang:-ffp-model=fast /clang:-fno-finite-math-only /clang:-Wno-format /clang:-Wno-unused-variable /clang:-Wno-unused-function /clang:-Wno-gnu-zero-variadic-macro-arguments"
            set "CXXFLAGS=/EHsc /clang:-march=%MARCH% %MTUNE_FLAG% /clang:-fvectorize /clang:-ffp-model=fast /clang:-fno-finite-math-only /clang:-Wno-format /clang:-Wno-unused-variable /clang:-Wno-unused-function /clang:-Wno-gnu-zero-variadic-macro-arguments"
          ) else (
            rem fallback to clang/clang++
            set "CC=%LLVM_DIR%\bin\clang.exe"
            set "CXX=%LLVM_DIR%\bin\clang++.exe"
            set "MTUNE_FLAG_UNIX="
            if not "%MTUNE%"=="" set "MTUNE_FLAG_UNIX=-mtune=%MTUNE%"
            set "CFLAGS=-march=%MARCH% %MTUNE_FLAG_UNIX% -fvectorize -ffp-model=fast -fno-finite-math-only -Wno-format -Wno-unused-variable -Wno-unused-function -Wno-gnu-zero-variadic-macro-arguments"
            set "CXXFLAGS=-march=%MARCH% %MTUNE_FLAG_UNIX% -fvectorize -ffp-model=fast -fno-finite-math-only -Wno-format -Wno-unused-variable -Wno-unused-function -Wno-gnu-zero-variadic-macro-arguments"
          )

          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DCMAKE_SYSTEM_NAME=Windows ^
            -DCMAKE_SYSTEM_PROCESSOR=x86_64 ^
            -DCMAKE_C_COMPILER="%CC%" ^
            -DCMAKE_CXX_COMPILER="%CXX%" ^
            -DLLAMA_FATAL_WARNINGS=OFF ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU_ALL_VARIANTS=${{ matrix.arch == 'x64' && 'ON' || 'OFF' }} ^
            -DGGML_OPENMP=ON ^
            -DCURL_LIBRARY="%CURL_PATH%\lib\libcurl.dll.a" ^
            -DCURL_INCLUDE_DIR="%CURL_PATH%\include" ^
            -DGGML_MAX_CONTEXTS=2048 ^
            -DLLAMA_CURL=OFF ^
            -DCMAKE_C_FLAGS="%CFLAGS%" ^
            -DCMAKE_CXX_FLAGS="%CXXFLAGS%" ^
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release --target llama-quantize

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        shell: pwsh
        run: |
          # quick note: "VC143" is the Visual C++ toolset folder name (msvc v14.3x, VS 2022).
          $redistRoot = Join-Path $env:VS_DIR "VC\Redist\MSVC"
          if (-not (Test-Path $redistRoot)) {
            Write-Error "MSVC redist root not found at $redistRoot (VS_DIR = $env:VS_DIR)"
            exit 1
          }
          # Prefer newest redist version folder name (sort descending)
          $msvcDirs = Get-ChildItem -Path $redistRoot -Directory -ErrorAction SilentlyContinue |
                      Sort-Object Name -Descending
          if (-not $msvcDirs) {
            Write-Error "No versioned directories found under $redistRoot"
            exit 1
          }
          $arch        = "${{ matrix.arch }}"                                   # e.g. x64 or arm64
          $llvmArch    = "${{ matrix.arch == 'x64' && 'x86_64' || 'aarch64' }}"  # keep your existing mapping
          $foundDll    = $null
          $foundDir    = $null
          foreach ($d in $msvcDirs) {
            # common redist layout uses debug_nonredist\<arch>\... ; search recursively for libomp140.*dll
            $searchRoot = Join-Path $d.FullName ("debug_nonredist\$arch")
            if (-not (Test-Path $searchRoot)) { continue }
            # look for libomp140.<arch>.dll (most robust) or any libomp140*.dll
            $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140.$llvmArch.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $dll) {
              # fallback: maybe filename differs slightly -> search libomp140*.dll
              $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140*.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($dll) {
              $foundDll = $dll.FullName
              $foundDir = $d.FullName
              break
            }
          }
          if (-not $foundDll) {
            Write-Error "Could not locate libomp DLL under $redistRoot for arch '$arch' (searched directories: $($msvcDirs | ForEach-Object { $_.Name } -join ', '))."
            exit 1
          }
          Write-Host "Found libomp DLL: $foundDll (in $foundDir)"
          Copy-Item -Path $foundDll -Destination ".\build\bin\Release\" -Force
          $zipname = "llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}.zip"
          7z a $zipname .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}.zip

  windows:
    if: false
    runs-on: windows-2025

    env:
      OPENBLAS_VERSION: 0.3.23
      VULKAN_VERSION: 1.4.313.2

    strategy:
      matrix:
        include:
          - backend: 'vulkan'
            arch: 'x64'
            defines: '-DGGML_VULKAN=ON'
            target: 'ggml-vulkan'
          - backend: 'opencl-adreno'
            arch: 'arm64'
            defines: '-G "Ninja Multi-Config" -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-arm64-release" -DGGML_OPENCL=ON -DGGML_OPENCL_USE_ADRENO_KERNELS=ON'
            target: 'ggml-opencl'

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cmake-${{ matrix.backend }}-${{ matrix.arch }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Vulkan SDK
        id: get_vulkan
        if: ${{ matrix.backend == 'vulkan' }}
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja

      - name: Install OpenCL Headers and Libs
        id: install_opencl
        if: ${{ matrix.backend == 'opencl-adreno' && matrix.arch == 'arm64' }}
        run: |
          git clone https://github.com/KhronosGroup/OpenCL-Headers
          cd OpenCL-Headers
          cmake -B build `
            -DBUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_CXX_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-arm64-release"
          cmake --build build --target install
          git clone https://github.com/KhronosGroup/OpenCL-ICD-Loader
          cd OpenCL-ICD-Loader
          cmake -B build-arm64-release `
            -A arm64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-arm64-release" `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-arm64-release"
          cmake --build build-arm64-release --target install --config Release

      - name: Build
        id: cmake_build
        run: |
          cmake -S . -B build ${{ matrix.defines }} -DGGML_NATIVE=OFF -DLLAMA_CURL=OFF -DGGML_MAX_CONTEXTS=2048
          cmake --build build --config Release --target llama-quantize --target ${{ matrix.target }}

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip .\build\bin\Release\*${{ matrix.target }}.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip

  windows-cuda:
    if: false
    runs-on: windows-2022

    strategy:
      matrix:
        cuda: ['12.8', '13.1'] # , '11.7'
        instr: ['avx2', 'avx512', 'avx512_vnni', 'avx512_vnni_bf16', 'avx512_vnni_vbmi', 'avx512_vnni_vbmi_bf16'] # 'avx', 'noavx' won't compile because missing declarations all over the place
        
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-${{ matrix.cuda }}-${{ matrix.instr }}
          variant: ccache
          evict-old-files: 1d

      - name: Install CUDA Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ matrix.cuda }}

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja

      - name: Build
        id: cmake_build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_NATIVE=OFF ^
            -DGGML_OPENMP=ON ^
            -DGGML_AVX=${{ matrix.instr == 'avx' && 'ON' || 'OFF' }} ^
            -DGGML_AVX2=${{ (matrix.instr == 'avx2' || matrix.instr == 'avx512' || matrix.instr == 'avx512_vnni' || matrix.instr == 'avx512_vnni_vbmi' || matrix.instr == 'avx512_vnni_bf16' || matrix.instr == 'avx512_vnni_vbmi_bf16') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512=${{ (matrix.instr == 'avx512' || matrix.instr == 'avx512_vnni' || matrix.instr == 'avx512_vnni_vbmi' || matrix.instr == 'avx512_vnni_bf16' || matrix.instr == 'avx512_vnni_vbmi_bf16') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_VNNI=${{ (matrix.instr == 'avx512_vnni' || matrix.instr == 'avx512_vnni_vbmi' || matrix.instr == 'avx512_vnni_bf16' || matrix.instr == 'avx512_vnni_vbmi_bf16') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_VBMI=${{ (matrix.instr == 'avx512_vnni_vbmi' || matrix.instr == 'avx512_vnni_vbmi_bf16') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_BF16=${{ (matrix.instr == 'avx512_vnni_bf16' || matrix.instr == 'avx512_vnni_vbmi_bf16') && 'ON' || 'OFF' }} ^
            -DGGML_CUDA=ON ^
            -DGGML_SCHED_MAX_COPIES=1 ^
            -DGGML_CUDA_IQK_FORCE_BF16=1 ^
            -DGGML_MAX_CONTEXTS=2048 ^
            -DLLAMA_CURL=OFF ^
            -DGGML_CUDA_USE_GRAPHS=ON

          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release --target llama-quantize -j %NINJA_JOBS%

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip
          name: llama-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip

      - name: Copy and pack Cuda runtime
        run: |
          echo "Cuda install location: ${{ env.CUDA_PATH }}"
          $dst='.\build\bin\cudart\'
          robocopy "${{env.CUDA_PATH}}\bin" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          robocopy "${{env.CUDA_PATH}}\lib" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          7z a cudart-llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip $dst\*

      - name: Upload Cuda runtime
        uses: actions/upload-artifact@v4
        with:
          path: cudart-llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip
          name: cudart-llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ matrix.cuda }}-x64-${{ matrix.instr }}.zip

  windows-sycl:
    if: false
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    env:
      WINDOWS_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/7cd9bba0-7aab-4e30-b3ae-2221006a4a05/intel-oneapi-base-toolkit-2025.1.1.34_offline.exe
      WINDOWS_DPCPP_MKL: intel.oneapi.win.cpp-dpcpp-common:intel.oneapi.win.mkl.devel:intel.oneapi.win.dnnl:intel.oneapi.win.tbb.devel
      ONEAPI_ROOT: "C:/Program Files (x86)/Intel/oneAPI"

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cmake-sycl
          variant: ccache
          evict-old-files: 1d

      - name: Install
        run:  |
          scripts/install-oneapi.bat $WINDOWS_BASEKIT_URL $WINDOWS_DPCPP_MKL

      - name: Build
        id: cmake_build
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          cmake -G "Ninja" -B build ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=icx ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_BACKEND_DL=ON -DBUILD_SHARED_LIBS=OFF ^
            -DGGML_SYCL=ON ^
            -DGGML_MAX_CONTEXTS=2048 ^
            -DLLAMA_CURL=OFF
          cmake --build build -j

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Build the release package
        id: pack_artifacts
        run: |
          echo "cp oneAPI running time dll files in ${{ env.ONEAPI_ROOT }} to ./build/bin"

          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_sycl_blas.5.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_core.2.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_tbb_thread.2.dll" ./build/bin

          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_adapter_level_zero.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_adapter_opencl.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_loader.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_win_proxy_loader.dll" ./build/bin

          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/sycl8.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/svml_dispmd.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/libmmd.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/libiomp5md.dll" ./build/bin

          cp "${{ env.ONEAPI_ROOT }}/dnnl/latest/bin/dnnl.dll" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/tbb/latest/bin/tbb12.dll" ./build/bin

          echo "cp oneAPI running time dll files to ./build/bin done"
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-sycl-x64.zip ./build/bin/*

      - name: Upload the release package
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-sycl-x64.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-sycl-x64.zip

  windows-hip:
    if: false
    runs-on: windows-2022

    strategy:
      matrix:
        include:
          - name: "radeon"
            gpu_targets: "gfx1100;gfx1101;gfx1102;gfx1030;gfx1031;gfx1032"

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6

      - name: Clone rocWMMA repository
        id: clone_rocwmma
        run: |
          git clone https://github.com/rocm/rocwmma --branch rocm-6.2.4 --depth 1

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cmake-hip-${{ matrix.name }}-x64
          evict-old-files: 1d

      - name: Install
        id: depends
        run: |
          $ErrorActionPreference = "Stop"
          write-host "Downloading AMD HIP SDK Installer"
          Invoke-WebRequest -Uri "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-24.Q3-WinSvr2022-For-HIP.exe" -OutFile "${env:RUNNER_TEMP}\rocm-install.exe"
          write-host "Installing AMD HIP SDK"
          Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -Wait
          write-host "Completed AMD HIP SDK installation"

      - name: Verify ROCm
        id: verify
        run: |
          & 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' --version

      - name: Build
        id: cmake_build
        run: |
          $env:HIP_PATH=$(Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | split-path | split-path)
          $env:CMAKE_PREFIX_PATH="${env:HIP_PATH}"
          cmake -G "Unix Makefiles" -B build -S . `
            -DCMAKE_C_COMPILER="${env:HIP_PATH}\bin\clang.exe" `
            -DCMAKE_CXX_COMPILER="${env:HIP_PATH}\bin\clang++.exe" `
            -DCMAKE_CXX_FLAGS="-I$($PWD.Path.Replace('\', '/'))/rocwmma/library/include/ -Wno-ignored-attributes -Wno-nested-anon-types" `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_NATIVE=OFF `
            -DAMDGPU_TARGETS="${{ matrix.gpu_targets }}" `
            -DGGML_HIP_ROCWMMA_FATTN=ON `
            -DGGML_HIP=ON `
            -DLLAMA_CURL=OFF `
            -DGGML_MAX_CONTEXTS=2048
          cmake --build build -j ${env:NUMBER_OF_PROCESSORS}
          md "build\bin\rocblas\library\"
          cp "${env:HIP_PATH}\bin\hipblas.dll" "build\bin\"
          cp "${env:HIP_PATH}\bin\rocblas.dll" "build\bin\"
          cp "${env:HIP_PATH}\bin\rocblas\library\*" "build\bin\rocblas\library\"

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-hip-${{ matrix.name }}-x64.zip .\build\bin\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-hip-${{ matrix.name }}-x64.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-hip-${{ matrix.name }}-x64.zip

  ios-xcode-build:
    if: false
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build
        id: cmake_build
        run: |
          sysctl -a
          cmake -B build -G Xcode \
            -DGGML_METAL_USE_BF16=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM=ggml \
            -DGGML_MAX_CONTEXTS=2048
          cmake --build build --config Release --target llama-quantize -j $(sysctl -n hw.logicalcpu) -- CODE_SIGNING_ALLOWED=NO

      - name: xcodebuild for swift package
        id: xcodebuild
        run: |
          ./build-xcframework.sh

      - name: Build Xcode project
        run: xcodebuild -project examples/llama.swiftui/llama.swiftui.xcodeproj -scheme llama.swiftui -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY= -destination 'generic/platform=iOS' FRAMEWORK_FOLDER_PATH=./build-ios build

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          zip --symlinks -r llama-${{ steps.tag.outputs.name }}-xcframework.zip build-apple/llama.xcframework

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-xcframework.zip
          name: llama-${{ steps.tag.outputs.name }}-xcframework

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) || github.event.inputs.create_release == 'true' }}

    # Fine-grant permission
    # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
        contents: write # for creating release

    runs-on: ubuntu-latest

    needs:
      #- windows
      - windows-cpu
      - windows-cpu-clang
      #- windows-cuda
      #- windows-sycl
      #- windows-hip
      - ubuntu-22-cpu
      #- ubuntu-22-vulkan
      - macOS-arm64
      - macOS-x64
      #- ios-xcode-build

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        id: move_artifacts
        run: |
          mkdir -p release

          echo "Renaming and moving zips to release..."
          for zip_file in artifact/llama-*.zip; do
            base_name=$(basename "$zip_file" .zip)
            zip_name="ik_llama-th-${base_name#llama-th-}.zip"
            echo "Moving $zip_file to release/$zip_name"
            mv "$zip_file" "release/$zip_name"
          done

          echo "Moving any remaining artifacts..."
          mv -v artifact/*.zip release/ || true

      - name: Create release
        id: create_release
        uses: Thireus/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            This is a special build of llama-quantize (ik_llama.cpp version) with the --individual-tensors parameter which allows to choose which specific tensors of a model to quantize and ignore the rest.
            This special version of llama-quantize is used in Thireus' [GGUF-Tool-Suite](https://github.com/Thireus/GGUF-Tool-Suite) to quantize individual tensors from their BF16 version.

            If you are looking for other llama-* tools, download from the main-* tagged releases instead: https://github.com/Thireus/ik_llama.cpp/tags

            <details open>

            ${{ github.event.head_commit.message }}

            </details>

            **macOS:**
            - [llama-quantize for macOS Apple Silicon (arm64)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{ steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-macos-arm64.zip)
            - [llama-quantize for macOS Intel (x64)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{ steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-macos-x64.zip)

            **Linux:**
            - [llama-quantize for Ubuntu x64 (CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{ steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-ubuntu-x64.zip)

            **Windows MSVC:**
            - [llama-quantize for Windows x64 (CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{ steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-x64.zip)

            ---
            ### Experimental Windows Clang builds can be found below

            *These special builds are supposed to run faster when tailored to your specific CPU architecture.*

            **Windows Clang (try x86_64_v3 if you're unsure of your processor architecture):**
            - [llama-quantize for Windows — x86_64_v3 - AVX2 (CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-x86_64_v3.zip)
            - [llama-quantize for Windows — x86_64_v4 - AVX512 (CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-x86_64_v4.zip)
            - [llama-quantize for Windows — znver1 (AMD CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-znver1.zip)
            - [llama-quantize for Windows — znver2 (AMD CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-znver2.zip)
            - [llama-quantize for Windows — znver3 (AMD CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-znver3.zip)
            - [llama-quantize for Windows — znver4 (AMD CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-znver4.zip)
            - [llama-quantize for Windows — znver5 (AMD CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-znver5.zip)
            - [llama-quantize for Windows — haswell (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-haswell.zip)
            - [llama-quantize for Windows — core-avx2 (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-core-avx2.zip)
            - [llama-quantize for Windows — broadwell (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-broadwell.zip)
            - [llama-quantize for Windows — skylake (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-skylake.zip)
            - [llama-quantize for Windows — skylake-avx512 (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-skylake-avx512.zip)
            - [llama-quantize for Windows — skx (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-skx.zip)
            - [llama-quantize for Windows — cascadelake (Intel CPU)](https://github.com/Thireus/ik_llama.cpp/releases/download/${{steps.tag.outputs.name }}/ik_llama-${{ steps.tag.outputs.name }}-bin-win-cpu-cascadelake.zip)
