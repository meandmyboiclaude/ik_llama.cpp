          **Linux CUDA 12.8:**
          - [Ubuntu x64 (CUDA 12.8) AVX2](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-12.8-x64-avx2.zip) - [CUDA 12.8 DLLs](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-12.8-x64-avx2.zip)
