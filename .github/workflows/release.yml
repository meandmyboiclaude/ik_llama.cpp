          - [Ubuntu x64 (Vulkan) AVX512](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-vulkan-x64-avx512.zip)
          - [Ubuntu x64 (Vulkan) AVX512 VNNI](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-vulkan-x64-avx512_vnni.zip)
          - [Ubuntu x64 (Vulkan) AVX512 VNNI BF16](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-vulkan-x64-avx512_vnni_bf16.zip)
