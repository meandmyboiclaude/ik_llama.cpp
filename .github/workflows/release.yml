          - arch: x64
            march: icelake-client
            mtune: icelake-client
            label: icelake-client
            instr: avx512_vnni_vbmi
          - arch: x64
            march: rocketlake
            mtune: rocketlake
            label: rocketlake
            instr: avx512_vnni_vbmi
          - arch: x64
            march: icelake-server
            mtune: icelake-server
            label: icelake-server
            instr: avx512_vnni_vbmi
          - arch: x64
            march: tigerlake
            mtune: tigerlake
            label: tigerlake
            instr: avx512_vnni_vbmi
          - arch: x64
            march: sapphirerapids
            mtune: sapphirerapids
            label: sapphirerapids
            instr: avx512_vnni_vbmi_bf16
          - arch: x64
            march: alderlake
            mtune: alderlake
            label: alderlake
            instr: avx512_vnni_vbmi_bf16
          - arch: x64
            march: raptorlake
            mtune: raptorlake
            label: raptorlake
            instr: avx512_vnni_vbmi
          - arch: x64
            march: meteorlake
            mtune: meteorlake
            label: meteorlake
            instr: avx2
          - arch: x64
            march: sierraforest
            mtune: sierraforest
            label: sierraforest
            instr: avx512_vnni_vbmi_bf16
          - arch: x64
            march: grandridge
            mtune: grandridge
            label: grandridge
            instr: avx512_vnni_vbmi_bf16
          - arch: x64
            march: graniterapids
            mtune: graniterapids
            label: graniterapids
            instr: avx512_vnni_vbmi_bf16
          - arch: x64
            march: emeraldrapids
            mtune: emeraldrapids
            label: emeraldrapids
            instr: avx512_vnni_vbmi_bf16

    env:
      MARCH: ${{ matrix.march }}
      MTUNE: ${{ matrix.mtune }}
      BUILD_LABEL: ${{ matrix.label }}
      INSTR: ${{ matrix.instr }}

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: windows-latest-cmake-cpu-${{ env.BUILD_LABEL }}-${{ env.INSTR }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: |
          choco install ninja

      - name: Detect Visual Studio installation and available clang
        shell: pwsh
        run: |
          # detect Enterprise, then BuildTools; set VS_DIR and LLVM_DIR (written to GITHUB_ENV)
          if (Test-Path 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise') {
            $vs = 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          elseif (Test-Path 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools') {
            $vs = 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools'
            $llvm = Join-Path $vs 'VC\Tools\Llvm\x64'
          }
          else {
            Write-Error "No supported Visual Studio installation found under expected paths. Please install Visual Studio Build Tools or the full IDE, or set VS_DIR manually."
            exit 1
          }

          Write-Host "Detected VS root: $vs"
          Write-Host "Assuming LLVM dir: $llvm"

          Add-Content -Path $env:GITHUB_ENV -Value ("VS_DIR=" + $vs)
          Add-Content -Path $env:GITHUB_ENV -Value ("LLVM_DIR=" + $llvm)

          # detect which clang binary exists
          $clangCl = Join-Path $llvm 'bin\clang-cl.exe'
          $clang   = Join-Path $llvm 'bin\clang.exe'

          if (Test-Path $clangCl) {
            Write-Host "Found clang-cl at $clangCl"
            Add-Content -Path $env:GITHUB_ENV -Value 'CMAKE_COMPILER_TYPE=clang-cl'
          }
          elseif (Test-Path $clang) {
            Write-Host "Found clang at $clang"
            Add-Content -Path $env:GITHUB_ENV -Value 'CMAKE_COMPILER_TYPE=clang'
          }
          else {
            Write-Error "No clang binary found in $llvm. Please install the LLVM/clang components in Visual Studio (Individual components -> filter 'clang')."
            exit 1
          }

      - name: Build
        shell: cmd
        env:
          MARCH: ${{ env.MARCH }}
          MTUNE: ${{ env.MTUNE }}
          INSTR: ${{ env.INSTR }}
        run: |
          rem set up the MSVC environment
          call "%VS_DIR%\VC\Auxiliary\Build\vcvarsall.bat" x64

          rem prepare optional mtune flags (only set if MTUNE is non-empty)
          set "MTUNE_FLAG="
          if not "%MTUNE%"=="" set "MTUNE_FLAG=/clang:-mtune=%MTUNE%"

          rem choose compiler binary and flags based on detection
          if "%CMAKE_COMPILER_TYPE%"=="clang-cl" (
            set "CC=%LLVM_DIR%\bin\clang-cl.exe"
            set "CXX=%LLVM_DIR%\bin\clang-cl.exe"
            set "CFLAGS=/clang:-march=%MARCH% %MTUNE_FLAG% /clang:-fvectorize /clang:-ffp-model=fast /clang:-fno-finite-math-only /clang:-Wno-format /clang:-Wno-unused-variable /clang:-Wno-unused-function /clang:-Wno-gnu-zero-variadic-macro-arguments"
            set "CXXFLAGS=/EHsc /clang:-march=%MARCH% %MTUNE_FLAG% /clang:-fvectorize /clang:-ffp-model=fast /clang:-fno-finite-math-only /clang:-Wno-format /clang:-Wno-unused-variable /clang:-Wno-unused-function /clang:-Wno-gnu-zero-variadic-macro-arguments"
          ) else (
            rem fallback to clang/clang++
            set "CC=%LLVM_DIR%\bin\clang.exe"
            set "CXX=%LLVM_DIR%\bin\clang++.exe"
            set "MTUNE_FLAG_UNIX="
            if not "%MTUNE%"=="" set "MTUNE_FLAG_UNIX=-mtune=%MTUNE%"
            set "CFLAGS=-march=%MARCH% %MTUNE_FLAG_UNIX% -fvectorize -ffp-model=fast -fno-finite-math-only -Wno-format -Wno-unused-variable -Wno-unused-function -Wno-gnu-zero-variadic-macro-arguments"
            set "CXXFLAGS=-march=%MARCH% %MTUNE_FLAG_UNIX% -fvectorize -ffp-model=fast -fno-finite-math-only -Wno-format -Wno-unused-variable -Wno-unused-function -Wno-gnu-zero-variadic-macro-arguments"
          )

          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DCMAKE_SYSTEM_NAME=Windows ^
            -DCMAKE_SYSTEM_PROCESSOR=x86_64 ^
            -DCMAKE_C_COMPILER="%CC%" ^
            -DCMAKE_CXX_COMPILER="%CXX%" ^
            -DLLAMA_FATAL_WARNINGS=OFF ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU_ALL_VARIANTS=${{ matrix.arch == 'x64' && 'ON' || 'OFF' }} ^
            -DGGML_OPENMP=ON ^
            -DGGML_AVX2=${{ matrix.instr == 'avx2' && 'ON' || 'OFF' }} ^
            -DGGML_AVX512=${{ matrix.instr == 'avx512' && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_VNNI=${{ contains(matrix.instr, 'vnni') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_VBMI=${{ contains(matrix.instr, 'vbmi') && 'ON' || 'OFF' }} ^
            -DGGML_AVX512_BF16=${{ contains(matrix.instr, 'bf16') && 'ON' || 'OFF' }} ^
            -DCURL_LIBRARY="%CURL_PATH%\lib\libcurl.dll.a" ^
            -DCURL_INCLUDE_DIR="%CURL_PATH%\include" ^
            -DGGML_MAX_CONTEXTS=2048 ^
            -DLLAMA_CURL=OFF ^
            -DCMAKE_C_FLAGS="%CFLAGS%" ^
            -DCMAKE_CXX_FLAGS="%CXXFLAGS%" ^
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        shell: pwsh
        run: |
          # quick note: "VC143" is the Visual C++ toolset folder name (msvc v14.3x, VS 2022).
          $redistRoot = Join-Path $env:VS_DIR "VC\Redist\MSVC"
          if (-not (Test-Path $redistRoot)) {
            Write-Error "MSVC redist root not found at $redistRoot (VS_DIR = $env:VS_DIR)"
            exit 1
          }
          # Prefer newest redist version folder name (sort descending)
          $msvcDirs = Get-ChildItem -Path $redistRoot -Directory -ErrorAction SilentlyContinue |
                      Sort-Object Name -Descending
          if (-not $msvcDirs) {
            Write-Error "No versioned directories found under $redistRoot"
            exit 1
          }
          $arch        = "${{ matrix.arch }}"                                   # e.g. x64 or arm64
          $llvmArch    = "${{ matrix.arch == 'x64' && 'x86_64' || 'aarch64' }}"  # keep your existing mapping
          $foundDll    = $null
          $foundDir    = $null
          foreach ($d in $msvcDirs) {
            # common redist layout uses debug_nonredist\<arch>\... ; search recursively for libomp140.*dll
            $searchRoot = Join-Path $d.FullName ("debug_nonredist\$arch")
            if (-not (Test-Path $searchRoot)) { continue }
            # look for libomp140.<arch>.dll (most robust) or any libomp140*.dll
            $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140.$llvmArch.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $dll) {
              # fallback: maybe filename differs slightly -> search libomp140*.dll
              $dll = Get-ChildItem -Path $searchRoot -Filter "libomp140*.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($dll) {
              $foundDll = $dll.FullName
              $foundDir = $d.FullName
              break
            }
          }
          if (-not $foundDll) {
            Write-Error "Could not locate libomp DLL under $redistRoot for arch '$arch' (searched directories: $($msvcDirs | ForEach-Object { $_.Name } -join ', '))."
            exit 1
          }
          Write-Host "Found libomp DLL: $foundDll (in $foundDir)"
          Copy-Item -Path $foundDll -Destination ".\build\bin\Release\" -Force
          7z a "llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}-${{ matrix.instr }}.zip" .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}-${{ matrix.instr }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-cpu-${{ matrix.label }}-${{ matrix.instr }}.zip

  windows:
    if: false
    runs-on: windows-2025

    env:
      OPENBLAS_VERSION: 0.3.23
      VULKAN_VERSION: 1.4.313.2

    strategy:
      matrix:
        include:
          - backend: 'vulkan'
            arch: 'x64'
            defines: '-DGGML_VULKAN=ON'
            target: 'ggml-vulkan'
          - backend: 'opencl-adreno'
            arch: 'arm64'
            defines: '-G "Ninja Multi-Config" -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-arm64-release" -DGGML_OPENCL=ON -DGGML_OPENCL_USE_ADRENO_KERNELS=ON'
            target: 'ggml-opencl'

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v4

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: windows-latest-cmake-${{ matrix.backend }}-${{ matrix.arch }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Vulkan SDK
        id: get_vulkan
        if: ${{ matrix.backend == 'vulkan' }}
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja

      - name: Install OpenCL Headers and Libs
        id: install_opencl
        if: ${{ matrix.backend == 'opencl-adreno' && matrix.arch == 'arm64' }}
        run: |
          git clone https://github.com/KhronosGroup/OpenCL-Headers
          cd OpenCL-Headers
          cmake -B build `
            -DBUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_CXX_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-arm64-release"
          cmake --build build --target install
          git clone https://github.com/KhronosGroup/OpenCL-ICD-Loader
          cd OpenCL-ICD-Loader
          cmake -B build-arm64-release `
            -A arm64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-arm64-release" `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-arm64-release"
          cmake --build build-arm64-release --target install --config release

      - name: Build
        id: cmake_build
        run: |
          cmake -S . -B build ${{ matrix.defines }} -DGGML_NATIVE=OFF -DLLAMA_CURL=OFF -DGGML_MAX_CONTEXTS=2048
          cmake --build build --config Release --target ${{ matrix.target }}

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          7z a llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip .\build\bin\Release\*${{ matrix.target }}.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip
          name: llama-${{ steps.tag.outputs.name }}-bin-win-${{ matrix.backend }}-${{ matrix.arch }}.zip

