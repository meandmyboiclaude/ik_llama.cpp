          - [Ubuntu x64 (CUDA 12.8) AVX512 VNNI BF16](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-12.8-x64-avx512_vnni_bf16.zip) - [CUDA 12.8 DLLs](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-12.8-x64-avx512_vnni_bf16.zip)
          - [Ubuntu x64 (CUDA 12.8) AVX512 VNNI VBMI](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-12.8-x64-x64-avx512_vnni_vbmi.zip) - [CUDA 12.8 DLLs](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-12.8-x64-avx512_vnni_vbmi.zip)
          - [Ubuntu x64 (CUDA 12.8) AVX512 VNNI VBMI BF16](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-12.8-x64-avx512_vnni_vbmi_bf16.zip) - [CUDA 12.8 DLLs](https://github.com/Thireus/ik_llama.cpp/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-12.8-x64-avx512_vnni_vbmi_bf16.zip)

          **Linux CUDA 13.2:**
          - [Ubuntu x64 (CUDA 13.2) AVX2](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-13.2-x64-avx2.zip) - [CUDA 13.2 DLLs](https://github.com/$repo/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-13.2-x64-avx2.zip)
          - [Ubuntu x64 (CUDA 13.2) AVX512](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-13.2-x64-avx512.zip) - [CUDA 13.2 DLLs](https://github.com/$repo/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-13.2-x64-avx512.zip)
          - [Ubuntu x64 (CUDA 13.2) AVX512 VNNI](https://github.com/$repo/releases/download/$tag/ik_llama-$tag-bin-ubuntu-cuda-13.2-x64-avx512_vnni.zip) - [CUDA 13.2 DLLs](https://github.com/$repo/releases/download/$tag/ik_llama-cudart-$tag-bin-ubuntu-cuda-13.2-x64-avx512_vnni.zip)
