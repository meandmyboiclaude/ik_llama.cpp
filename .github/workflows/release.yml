            label: haswell
            instr: avx2
          - arch: x64
            march: core-avx2
            mtune: core-avx2
            label: core-avx2
            instr: avx2
          - arch: x64
            march: broadwell
            mtune: broadwell
            label: broadwell
            instr: avx2
          - arch: x64
            march: skylake
            mtune: skylake
            label: skylake
            instr: avx2
          - arch: x64
            march: skylake-avx512
            mtune: skylake-avx512
            label: skylake-avx512
            instr: avx512
          - arch: x64
            march: skx
            mtune: skx
            label: skx
            instr: avx512
          - arch: x64
            march: cascadelake
            mtune: cascadelake
            label: cascadelake
            instr: avx512_vnni
          - arch: x64
            march: cooperlake
            mtune: cooperlake
            label: cooperlake
            instr: avx512_vnni_bf16
          - arch: x64
            march: cannonlake
            mtune: cannonlake
            label: cannonlake
